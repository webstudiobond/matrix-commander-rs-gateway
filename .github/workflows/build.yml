name: Build and Publish Docker Image

on:
  schedule:
    # Run at 03:00 UTC every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Check for upstream updates
        id: check
        run: |
          # Fetch actual upstream version and digest
          MATRIX_VER=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/8go/matrix-commander-rs/releases/latest | jq -r .tag_name)
          DEBIAN_DIG=$(skopeo inspect docker://debian:trixie-slim | jq -r .Digest)
          
          echo "matrix_ver=$MATRIX_VER" >> "$GITHUB_OUTPUT"
          echo "debian_dig=$DEBIAN_DIG" >> "$GITHUB_OUTPUT"
          
          # GHCR requires strict lowercase repository names
          IMAGE_BASE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_base=$IMAGE_BASE" >> "$GITHUB_OUTPUT"
          
          # Fetch labels from the currently published latest image
          if skopeo inspect "docker://$IMAGE_BASE:latest" > meta.json 2>/dev/null; then
            OUR_MAT_VER=$(jq -r '.Labels["org.opencontainers.image.version"] // "none"' meta.json)
            OUR_DEB_DIG=$(jq -r '.Labels["org.opencontainers.image.base.digest"] // "none"' meta.json)
          else
            OUR_MAT_VER="none"
            OUR_DEB_DIG="none"
          fi
          
          # Evaluate build necessity
          if [ "$MATRIX_VER" != "$OUR_MAT_VER" ] || [ "$DEBIAN_DIG" != "$OUR_DEB_DIG" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Triggering build: Upstream or manual dispatch detected."
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping build: Image is up to date."
          fi

      - name: Checkout repository
        if: steps.check.outputs.needs_build == 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up QEMU
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to the Container registry
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.check.outputs.image_base }}:latest
            ${{ steps.check.outputs.image_base }}:${{ steps.check.outputs.matrix_ver }}
          build-args: |
            UPSTREAM_VERSION=${{ steps.check.outputs.matrix_ver }}
            DEBIAN_DIGEST=${{ steps.check.outputs.debian_dig }}
          labels: |
            org.opencontainers.image.version=${{ steps.check.outputs.matrix_ver }}
            org.opencontainers.image.base.digest=${{ steps.check.outputs.debian_dig }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Hardened Docker container exposing matrix-commander-rs over an SSH reverse tunnel
