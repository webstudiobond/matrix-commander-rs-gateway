services:
  matrix-gw:
    image: ghcr.io/underhax/matrix-commander-rs-gateway:latest
    build:
      context: https://github.com/underhax/matrix-commander-rs-gateway.git#main
      args:
        # Pass host platform to BuildKit for multi-arch binary selection.
        TARGETARCH: ${TARGETARCH:-amd64}
    container_name: matrix-gw
    hostname: matrix-gw
    restart: unless-stopped
    ports:
      - "127.0.0.1:2222:2222"
    healthcheck:
        # nc -z: TCP connect-only probe. sshd is ready the moment it accepts
        # connections; a full SSH handshake is unnecessary and brittle.
        test: ["CMD", "nc", "-z", "127.0.0.1", "2222"]
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 10s
    user: "10001:10001"
    # Root filesystem is read-only. All legitimate write paths are covered by
    # the volumes and tmpfs mounts below.
    read_only: true
    tmpfs:
      # sshd requires a writable /run/sshd; no persistence needed.
      - /run/sshd:mode=0755,uid=10001,gid=10001,noexec,nosuid
      # sshd writes its PidFile here.
      - /tmp:mode=1777,noexec,nosuid
    volumes:
      # Router public key — read-only. Host file must be owned by 10001 or
      # have world-readable permissions (0644).
      - ./authorized_keys:/home/bot/.ssh/authorized_keys:ro
      # Persistent Matrix session database. Host directory must be owned by
      # UID 10001 (see README for setup commands).
      - ./bot_data:/home/bot/.local/share/matrix-commander-rs
      # SSH host keys — persisted across restarts to avoid host key churn.
      # Host directory must be owned by UID 10001.
      - ./host_keys:/home/bot/keys
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add: []
    cpus: 0.3
    mem_limit: 128m
    mem_reservation: 32m
